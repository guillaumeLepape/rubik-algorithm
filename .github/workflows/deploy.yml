name: 📦 Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deployment

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Configure Git Credentials
        run: |
          git config user.name "${{ secrets.USER_NAME }}"
          git config user.email "${{ secrets.USER_MAIL }}"

      - name: Build website
        run: uv run mkdocs build

      - name: Deploy to release/main
        run: |-
          git fetch origin release/main
          mkdir /tmp/release
          cp -r site /tmp/release/site
          cp docker-compose.yml /tmp/release/docker-compose.yml
          git switch release/main
          cp /tmp/release/docker-compose.yml docker-compose.yml
          cp /tmp/release/site site
          git add -A
          git commit -m "Deploy docs"
          git push origin HEAD:release/main --force
